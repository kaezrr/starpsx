name: Build & Release

on:
  push:
    branches: ["main", "ci-test"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: x86_64
            ext: AppImage
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x86_64
            ext: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libasound2-dev libfuse2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            v="${{ github.ref_name }}"
            echo "value=${v#v}" >> $GITHUB_OUTPUT
          else
            echo "value=dev" >> $GITHUB_OUTPUT
          fi

      # ---------- Linux ----------
      - name: Build AppImage
        if: runner.os == 'Linux'
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          wget -q -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/

          bash scripts/build_appimage.sh

          mv StarPSX-x86_64.AppImage \
            StarPSX-${{ steps.version.outputs.value }}-linux-${{ matrix.arch }}.AppImage

      # ---------- macOS ----------
      - name: Build macOS bundle
        if: runner.os == 'macOS'
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          bash scripts/build_macapp.sh

          codesign --deep --force --sign - StarPSX.app

          zip -r \
            StarPSX-${{ steps.version.outputs.value }}-macos-${{ matrix.arch }}.zip \
            StarPSX.app

      # ---------- Windows ----------
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "StarPSX-${{ steps.version.outputs.value }}-windows-${{ matrix.arch }}"
          mkdir $name
          cp target/${{ matrix.target }}/release/starpsx.exe $name/
          cp LICENSE $name/
          Compress-Archive $name "$name.zip"

      # ---------- Upload ----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: starpsx-${{ steps.version.outputs.value }}-${{ matrix.target }}
          path: |
            *.AppImage
            *.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
